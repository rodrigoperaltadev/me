project: my-resume
initialized: "2026-06-22"

stack:
  framework: "Next.js 15 (App Router, Turbopack)"
  language: "TypeScript 5"
  styling: "Tailwind CSS v4"
  animation:
    - "GSAP 3"
    - "Motion (Framer Motion)"
    - "Lenis (smooth scroll)"
    - "next-view-transitions"
  ui_libs:
    - "lucide-react"
    - "clsx"
    - "tailwind-merge"
  react: "19"

architecture:
  src/app: "Next.js App Router pages"
  src/components/sections: "Page sections (Hero, About, Experience, Stack, Contact, Footer, Navbar)"
  src/components/ui: "Reusable UI components (BrutalistButton, TerminalWindow)"
  src/hooks: "Custom React hooks (useAnimations)"
  src/lib: "Utilities, data, dictionary"

testing:
  framework: none
  strict_tdd: false

sdd_session:
  execution_mode: interactive
  artifact_store: openspec
  chained_pr_strategy: ask-always
  review_budget_lines: 400
